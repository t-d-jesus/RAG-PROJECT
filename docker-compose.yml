services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: rag-qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rag-app
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      CHROMA_PATH: /app/chroma

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}

      QDRANT_URL: http://qdrant:6333
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OPENSEARCH_USE_SSL: "false"
      OPENSEARCH_VERIFY_CERTS: "false"

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      opensearch:
        condition: service_started

    volumes:
      - ./data:/app/data
      - ./chroma:/app/chroma

    stdin_open: true
    tty: true

  opensearch:
    image: opensearchproject/opensearch:3.7.0
    container_name: rag-opensearch
    restart: unless-stopped

    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"

    ports:
      - "9200:9200"
      - "9600:9600"

    volumes:
      - opensearch_data:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.7.0
    container_name: rag-opensearch-dashboards
    restart: unless-stopped

    ports:
      - "5601:5601"

    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"

    depends_on:
      - opensearch

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: rag-prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

    depends_on:
      app:
        condition: service_started

  grafana:
    image: grafana/grafana:12.0.2
    container_name: rag-grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
  opensearch_data:
  prometheus_data:
  grafana_data:
